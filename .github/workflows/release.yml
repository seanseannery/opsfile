name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'examples/Opsfile*'
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: make test

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bump version
        id: version
        run: |
          BUMP=${{ inputs.bump || 'minor' }}
          make release BUMP=$BUMP
          version=$(sed -n 's/.*Version = "\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/p' internal/version.go)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/version.go
          git commit -m "release: bump version to v${{ steps.version.outputs.version }} [no ci]"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: bin/ops_*
